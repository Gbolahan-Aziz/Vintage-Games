# Local development with ministack / Docker Compose
# Mirrors the Kubernetes setup so you can test before pushing to AWS EKS.
#
# Usage:
#   docker compose up --build
#   Open http://localhost:8080

version: "3.9"

services:
  arcade:
    build:
      context: ./home
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      # Hot-reload HTML/JS changes without rebuilding
      - ./home:/usr/share/nginx/html:ro
      - ./home/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
