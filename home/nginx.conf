worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Homepage
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Games — served directly from embedded HTML files
        location /games/ {
            try_files $uri $uri/ =404;
        }

        # Legacy proxy routes kept for backwards compat with k8s ingress
        location /tetris {
            return 301 /games/tetris.html;
        }

        location /2048 {
            return 301 /games/2048.html;
        }

        # Sounds & static assets
        location /sounds/ {
            add_header Cache-Control "public, max-age=31536000";
        }

        gzip on;
        gzip_types text/html text/css application/javascript;
    }
}
